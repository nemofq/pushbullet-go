<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pushbullet</title>
  <style>
    :root {
      /* Light theme */
      color-scheme: light dark;
      /* second-line (toolbar) control height — a touch shorter than the 40px
         input, so the action row reads as secondary. */
      --row2-h: 36px;
      /* compose vertical rhythm, kept compact so the footer steals as little
         height as possible from the message list: symmetric padding above
         line 1 / below line 2, and a smaller gap between the two lines so
         they still read as one unit. */
      --compose-pad-y: 8px;
      --compose-gap: 6px;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #f9f9f9;
      --bg-header: #ffffff;
      --bg-message-sent: #68BF78;
      --bg-message-received: #f0f0f0;
      --bg-message-received-hover: #e8e8e8;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --text-white: #ffffff;
      --text-link: #1976d2;
      --text-link-sent: #f0f0f0;
      --border-primary: #eeeeee;
      --border-secondary: #dddddd;
      --button-primary: #4caf50;
      --button-primary-hover: #45a049;
      --button-disabled: #a5d6a7;
      --copy-button: #cccccc;
      --copy-button-hover: #4caf50;
      --status-connected: #4caf50;
      --status-connecting: #ff9800;
      --status-disconnected: #f44336;
      --accent-soft: rgba(76, 175, 80, 0.12);
      --accent-soft-hover: rgba(76, 175, 80, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-tertiary: #242424;
        --bg-header: #1a1a1a;
        --bg-message-sent: #4caf50;
        --bg-message-received: #2d2d2d;
        --bg-message-received-hover: #353535;
        --text-primary: #ffffff;
        --text-secondary: #cccccc;
        --text-tertiary: #999999;
        --text-white: #ffffff;
        --text-link: #64b5f6;
        --text-link-sent: #f0f0f0;
        --border-primary: #404040;
        --border-secondary: #555555;
        --button-primary: #4caf50;
        --button-primary-hover: #45a049;
        --copy-button: #666666;
        --copy-button-hover: #4caf50;
        --status-connected: #4caf50;
        --status-connecting: #ff9800;
        --status-disconnected: #f44336;
        --accent-soft: rgba(76, 175, 80, 0.18);
        --accent-soft-hover: rgba(76, 175, 80, 0.28);
      }
    }

    .theme-light {
      color-scheme: light;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #f9f9f9;
      --bg-header: #ffffff;
      --bg-message-sent: #68BF78;
      --bg-message-received: #f0f0f0;
      --bg-message-received-hover: #e8e8e8;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --text-white: #ffffff;
      --text-link: #1976d2;
      --text-link-sent: #f0f0f0;
      --border-primary: #eeeeee;
      --border-secondary: #dddddd;
      --button-primary: #4caf50;
      --button-primary-hover: #45a049;
      --button-disabled: #a5d6a7;
      --copy-button: #cccccc;
      --copy-button-hover: #4caf50;
      --status-connected: #4caf50;
      --status-connecting: #ff9800;
      --status-disconnected: #f44336;
      --accent-soft: rgba(76, 175, 80, 0.12);
      --accent-soft-hover: rgba(76, 175, 80, 0.2);
    }

    .theme-dark {
      color-scheme: dark;
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --bg-tertiary: #242424;
      --bg-header: #1a1a1a;
      --bg-message-sent: #4caf50;
      --bg-message-received: #2d2d2d;
      --bg-message-received-hover: #353535;
      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --text-tertiary: #999999;
      --text-white: #ffffff;
      --text-link: #64b5f6;
      --text-link-sent: #f0f0f0;
      --border-primary: #404040;
      --border-secondary: #555555;
      --button-primary: #4caf50;
      --button-primary-hover: #45a049;
      --button-disabled: #2f4f33;
      --copy-button: #666666;
      --copy-button-hover: #4caf50;
      --status-connected: #4caf50;
      --status-connecting: #ff9800;
      --status-disconnected: #f44336;
      --accent-soft: rgba(76, 175, 80, 0.18);
      --accent-soft-hover: rgba(76, 175, 80, 0.28);
    }

    body {
      width: 450px;
      height: 600px;
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
    }

    body.dragging textarea {
      border: 2px solid var(--button-primary);
      padding: 8px 11px;
      /* Compensate for border increase (from 1px to 2px) */
      background: var(--bg-secondary);
    }

    .header {
      padding: 12px;
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      background: var(--bg-header);
      transition: background-color 0.3s ease, border-color 0.3s ease;
      flex-shrink: 0;
    }

    .tab-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-button {
      background: none;
      border: 1px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }

    .tab-button.active {
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
    }

    .tab-button:hover {
      color: var(--text-primary);
    }

    .status {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      margin-right: 9px;
    }

    .status.connected {
      background: var(--status-connected);
    }

    .status.connecting {
      background: var(--status-connecting);
    }

    .status.disconnected {
      background: var(--status-disconnected);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      background: var(--bg-secondary);
      max-width: 300px;
      width: fit-content;
      transition: background-color 0.3s ease;
    }

    .message.sent {
      background: var(--bg-message-sent);
      color: var(--text-white);
    }

    .message.received {
      background: var(--bg-message-received);
    }

    .message-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    .message-row.received {
      align-items: flex-start;
    }

    .message-row.sent {
      align-items: flex-end;
    }

    .message-content {
      display: flex;
      align-items: flex-start;
      max-width: calc(100% - 70px);
    }

    .message-row.received .message-content {
      flex-direction: row;
      margin-left: 10px;
      margin-right: 60px;
    }

    .message-row.sent .message-content {
      flex-direction: row-reverse;
      margin-left: 60px;
      margin-right: 10px;
    }

    .message-timestamp {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 5px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .message-row.received .message-timestamp {
      margin-left: 10px;
      text-align: left;
    }

    .message-row.sent .message-timestamp {
      margin-right: 10px;
      text-align: right;
    }

    .message-title {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .message.sent .message-title {
      color: var(--text-white);
    }

    .message-body {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      font-size: 14px;
      max-width: 100%;
    }

    .copy-button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--copy-button);
      padding: 4px;
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-button svg {
      width: 14px;
      height: 14px;
    }

    .message-row:hover .copy-button {
      opacity: 1;
    }

    .copy-button:hover {
      color: var(--copy-button-hover);
    }

    .push-delete-button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--copy-button);
      padding: 4px;
      margin-left: 2px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .push-delete-button svg {
      width: 14px;
      height: 14px;
    }

    .message-row:hover .push-delete-button {
      opacity: 1;
    }

    .push-delete-button:hover {
      color: #f44336;
    }

    .message-link {
      color: var(--text-link);
      text-decoration: none;
    }

    .message.sent .message-link {
      color: var(--text-link-sent);
    }

    .message-link:hover {
      text-decoration: underline;
    }

    .message-image {
      max-width: 100%;
      border-radius: 4px;
      cursor: pointer;
    }

    .send-form {
      border-top: 1px solid var(--border-primary);
      padding: 0;
      background: var(--bg-tertiary);
      transition: background-color 0.3s ease, border-color 0.3s ease;
      flex-shrink: 0;
      position: relative;
    }

    /* the two-line compose stack: input on line 1, toolbar on line 2 */
    .compose {
      display: flex;
      flex-direction: column;
      gap: var(--compose-gap);
      padding: var(--compose-pad-y) 15px;
    }

    /* Auto-grows with content (popup.js sets the height on input) from the
       idle 40px up to a ~5-line cap, then scrolls. line-height 1.4 keeps
       multi-line text readable; the 9px padding keeps a single line at the
       familiar 40px. No height transition: growth must track typing
       instantly. */
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 12px;
      border: 1px solid var(--border-secondary);
      border-radius: 10px;
      resize: none;
      min-height: 40px;
      overflow-y: hidden;
      font-family: inherit;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.4;
      transition: border-color 0.3s ease, background-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--button-primary);
    }

    /* Scrollbar for the capped multi-line state: same inset-pill treatment
       as .target-menu, drawn inside the rounded border. */
    textarea::-webkit-scrollbar {
      width: 11px;
    }

    textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    textarea::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 6px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    textarea::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
      background-clip: content-box;
    }

    /* line 2: target control pinned left, file + send pinned right */
    .compose-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: var(--row2-h);
    }

    /* margin-left:auto keeps file+send hard right whether or not the target
       control is present, so the Send button never shifts when the option is
       toggled off. */
    .toolbar-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      margin-left: auto;
    }

    /* Base icon button (used by File + Send). Sized to --row2-h so the action
       row sits a touch shorter than the 40px input above it. */
    .icon-button {
      background: var(--button-primary);
      color: var(--text-white);
      border: none;
      padding: 0;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--row2-h);
      height: var(--row2-h);
      flex-shrink: 0;
      transition: background-color 0.3s ease;
    }

    .icon-button:hover {
      background: var(--button-primary-hover);
    }

    .icon-button:disabled {
      background: var(--button-disabled);
      cursor: not-allowed;
    }

    .icon-button:disabled:hover {
      background: var(--button-disabled);
    }

    .icon-button svg {
      width: 16px;
      height: 16px;
    }

    /* File = secondary action: outlined so it recedes behind Send. */
    .icon-button.is-secondary {
      background: transparent;
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
    }

    .icon-button.is-secondary:hover {
      background: var(--accent-soft);
      border-color: var(--button-primary);
      color: var(--button-primary);
    }

    /* Send = primary action: labelled + wider, using the second line's extra
       room so it's unmistakably the main button, not a twin of File. */
    .icon-button.send-button {
      width: auto;
      padding: 0 16px;
      gap: 7px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
    }

    .send-button .send-label {
      white-space: nowrap;
    }

    /* ---------------------------------------------------------------
       THE TARGET CONTROL — one element, two faces.
       Default face: a quiet outlined chip naming the default destination.
       Custom face : a green "<name> ✕" pill for this send's override.
       --------------------------------------------------------------- */
    .target-control {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      height: var(--row2-h);
      box-sizing: border-box;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .target-control[hidden] {
      display: none;
    }

    /* Both faces keep the icon + NAME visible (the target is always legible).
       default = quiet outlined chip naming the default destination, with a
       dropdown caret; it stays subtle so it never competes with Send. */
    .target-control.is-default {
      width: auto;
      max-width: 200px;
      gap: 5px;
      padding: 0 8px 0 10px;
      border: 1px solid var(--border-secondary);
      border-radius: 18px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .target-control.is-default:hover {
      border-color: var(--button-primary);
      color: var(--button-primary);
      background: var(--accent-soft);
    }

    /* custom = unmistakable green pill for the device(s) chosen for THIS send. */
    .target-control.is-custom {
      width: auto;
      max-width: 240px;
      gap: 5px;
      padding: 0 6px 0 10px;
      border: 1px solid var(--button-primary);
      border-radius: 18px;
      background: var(--accent-soft);
      color: var(--button-primary);
      font-size: 13px;
      font-weight: 500;
    }

    .target-control.is-custom:hover {
      background: var(--accent-soft-hover);
    }

    /* icon + label show in BOTH faces; caret only on default, ✕ only on custom */
    .target-control .tc-icon {
      display: flex;
    }

    .target-control .tc-icon svg {
      width: 16px;
      height: 16px;
    }

    /* the always-visible name; ellipsizes when the device name is long */
    .target-control .tc-label {
      display: inline;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 150px;
    }

    .target-control .tc-caret,
    .target-control .tc-clear {
      display: none;
    }

    .target-control.is-default .tc-caret {
      display: inline-flex;
      align-items: center;
      opacity: 0.7;
    }

    .target-control .tc-caret svg {
      width: 16px;
      height: 16px;
    }

    .target-control.is-custom .tc-clear {
      display: inline-flex;
    }

    .target-control .tc-clear {
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .target-control .tc-clear svg {
      width: 13px;
      height: 13px;
    }

    .target-control .tc-clear:hover {
      background: var(--accent-soft-hover);
    }

    /* ---------------------------------------------------------------
       target dropdown menu — text-only, opens upward, anchored above
       the second (bottom) line of the composer.
       --------------------------------------------------------------- */
    .target-menu {
      position: absolute;
      left: 15px;
      bottom: 51px;
      width: 232px;
      /* ~6.5 compact rows (default row + tip + divider + ~5.5 devices),
         matching the options-page checklist density */
      max-height: 222px;
      overflow-y: auto;
      background: var(--bg-primary);
      border: 1px solid var(--border-secondary);
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
      padding: 6px;
      z-index: 20;
      box-sizing: border-box;
    }

    .target-menu[hidden] {
      display: none;
    }

    /* Scrollbar drawn inside the rounded menu: transparent track keeps the
       border's rounded corners intact; the thumb is an inset pill. */
    .target-menu::-webkit-scrollbar {
      width: 12px;
    }

    .target-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .target-menu::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 6px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .target-menu::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
      background-clip: content-box;
    }

    .menu-divider {
      height: 1px;
      background: var(--border-primary);
      margin: 6px 4px;
    }

    /* small muted hint under the Default option; the top padding keeps it
       clear of the option's selected background. The "Options" word is an
       always-visible green link (same treatment as the options page's
       "Authenticate via OAuth" link). */
    .menu-tip {
      padding: 4px 10px 4px;
      font-size: 11.5px;
      color: var(--text-tertiary);
    }

    .menu-tip-link {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      color: var(--button-primary);
      cursor: pointer;
    }

    .menu-tip-link:hover {
      text-decoration: underline;
    }

    .menu-option {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
      border: none;
      background: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text-primary);
      text-align: left;
    }

    .menu-option:hover {
      background: var(--bg-secondary);
    }

    .menu-option .opt-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .menu-option .opt-check {
      display: flex;
      flex-shrink: 0;
      color: var(--button-primary);
      opacity: 0;
    }

    .menu-option .opt-check svg {
      width: 16px;
      height: 16px;
    }

    /* Leading checkbox — device rows only (multi-select toggles). The
       default/all row keeps the trailing ✓ instead. */
    .menu-option .opt-checkbox {
      width: 16px;
      height: 16px;
      box-sizing: border-box;
      border: 1.5px solid var(--border-secondary);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-white);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .menu-option .opt-checkbox svg {
      width: 11px;
      height: 11px;
      opacity: 0;
    }

    .menu-option.selected .opt-checkbox {
      background: var(--button-primary);
      border-color: var(--button-primary);
    }

    .menu-option.selected .opt-checkbox svg {
      opacity: 1;
    }

    .menu-option.selected {
      background: var(--accent-soft);
    }

    .menu-option.selected .opt-check {
      opacity: 1;
    }

    .no-messages {
      text-align: center;
      color: var(--text-secondary);
      margin-top: 50px;
    }

    .setup-guide {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      position: absolute;
      top: 80px;
      /* Below header */
      bottom: 0;
      left: 0;
      right: 0;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .setup-guide.show {
      display: flex;
    }

    .setup-guide h3 {
      margin: 0 0 15px 0;
      color: var(--text-primary);
      font-weight: normal;
      font-size: 16px;
    }

    .setup-guide p {
      margin: 0 0 20px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .setup-button {
      background: var(--button-primary);
      color: var(--text-white);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s ease;
    }

    .setup-button:hover {
      background: var(--button-primary-hover);
    }

    #retryConnection:hover {
      background: var(--button-primary-hover) !important;
    }

    .notification-card {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .notification-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .notification-icon-wrap {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .notification-icon {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Zoom to crop the JPEG chroma-bleed band; matches MIRROR_ICON_INSET (1 / (1 - 0.06)) */
      transform: scale(1.064);
    }

    .notification-app {
      font-weight: bold;
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .notification-timestamp {
      font-size: 11px;
      color: var(--text-tertiary);
      flex-shrink: 0;
      margin-left: 8px;
    }

    .notification-title {
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 14px;
      color: var(--text-primary);
      overflow-wrap: anywhere;
    }

    .notification-body {
      font-size: 13px;
      color: var(--text-secondary);
      overflow-wrap: anywhere;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .notification-actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      margin-bottom: -4px;
      align-items: center;
      justify-content: flex-end;
    }

    .notification-actions.has-verification-code {
      justify-content: space-between;
    }

    .notification-copy-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
    }

    .notification-copy-button svg {
      width: 14px;
      height: 14px;
      fill: var(--copy-button);
      transition: fill 0.2s ease;
    }

    .notification-copy-button:hover {
      background: rgba(76, 175, 80, 0.1);
    }

    .notification-copy-button:hover svg {
      fill: var(--copy-button-hover);
    }

    .notification-delete-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
    }

    .notification-delete-button svg {
      width: 16px;
      height: 16px;
      fill: var(--copy-button);
      transition: fill 0.2s ease;
    }

    .notification-delete-button:hover {
      background: rgba(244, 67, 54, 0.1);
    }

    .notification-delete-button:hover svg {
      fill: #f44336;
    }

    .sms-shortcut {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.3s ease;
    }

    .sms-shortcut svg {
      fill: var(--text-secondary);
      transition: fill 0.3s ease;
    }

    .sms-shortcut:hover {
      color: var(--button-primary);
    }

    .sms-shortcut:hover svg {
      fill: var(--button-primary);
    }

    .quick-share-container {
      padding: 10px 15px;
      border-bottom: 1px solid var(--border-primary);
    }

    .quick-share-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quick-share-url {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      font-family: inherit;
    }

    .quick-share-button {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-secondary);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .quick-share-button:hover {
      color: var(--button-primary);
      border-color: var(--button-primary);
    }

    .clear-history-button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 12px;
      padding: 4px 6px;
      margin: 0 auto 12px auto;
      transition: color 0.2s ease;
      text-decoration: underline;
      display: block;
      width: fit-content;
    }

    .clear-history-button:hover {
      color: var(--copy-button-hover);
    }

    .clear-notifications-bar {
      border-top: 1px solid var(--border-primary);
      background: var(--bg-tertiary);
      padding: 8px 15px;
      display: none;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .clear-notifications-button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 12px;
      transition: color 0.2s ease;
      padding: 0;
    }

    .clear-notifications-button:hover {
      color: var(--copy-button-hover);
    }

    .logo-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      font-size: 15px;
      transition: color 0.3s ease;
      user-select: none;
    }

    .logo-link:hover {
      color: var(--button-primary);
    }

    .verification-code-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-secondary);
      padding: 6px 12px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-top: 8px;
      margin-bottom: 4px;
      min-width: 95px;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
    }

    .verification-code-button:hover {
      background: var(--bg-message-received-hover);
      border-color: var(--button-primary);
      transform: translateY(-1px);
    }

    .verification-code-button:active {
      transform: translateY(0);
    }

    /* Light mode: bright green button */
    .theme-light .verification-code-button {
      background: #4caf50;
      color: #ffffff;
      border: none;
    }

    .theme-light .verification-code-button:hover {
      background: #45a049;
      border: none;
    }

    @media (prefers-color-scheme: light) {
      :root:not(.theme-dark) .verification-code-button {
        background: #4caf50;
        color: #ffffff;
        border: none;
      }

      :root:not(.theme-dark) .verification-code-button:hover {
        background: #45a049;
        border: none;
      }
    }

    .verification-code-button .code-text {
      font-family: 'Courier New', Consolas, Monaco, monospace;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .verification-code-button .status-text {
      font-family: sans-serif;
      font-weight: 600;
      letter-spacing: normal;
      line-height: 1.2;
    }

    .verification-code-button svg {
      flex-shrink: 0;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <div class="header">
    <div style="display: flex; align-items: center;">
      <div id="connectionStatus" class="status disconnected"></div>
      <a id="logoLink" class="logo-link" href="#" target="_blank">Push Go</a>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a id="smsShortcut" class="sms-shortcut" href="https://www.pushbullet.com/#sms/" target="_blank"
        style="display: none;" data-i18n-title="open_sms_web_interface">
        <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="14" height="14" viewBox="0 0 24 24">
          <path
            d="M 5 3 C 3.9069372 3 3 3.9069372 3 5 L 3 19 C 3 20.093063 3.9069372 21 5 21 L 19 21 C 20.093063 21 21 20.093063 21 19 L 21 12 L 19 12 L 19 19 L 5 19 L 5 5 L 12 5 L 12 3 L 5 3 z M 14 3 L 14 5 L 17.585938 5 L 8.2929688 14.292969 L 9.7070312 15.707031 L 19 6.4140625 L 19 10 L 21 10 L 21 3 L 14 3 z">
          </path>
        </svg>
        <span data-i18n="sms_button">SMS</span>
      </a>
      <div class="tab-switcher" id="tabSwitcher" style="display: none;">
        <button id="pushTab" class="tab-button active" data-i18n="push_button">Push</button>
        <button id="notificationTab" class="tab-button" data-i18n="notification_button">Notification</button>
      </div>
      <button id="retryConnection"
        style="background: var(--button-primary); color: var(--text-white); border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: background-color 0.3s ease;"
        data-i18n="reconnect_button">
        Reconnect
      </button>
    </div>
  </div>

  <div class="messages" id="messagesList">
  </div>

  <div class="messages" id="notificationsList" style="display: none;">
  </div>

  <div class="clear-notifications-bar" id="clearNotificationsBar">
    <button id="clearNotificationsButton" class="clear-notifications-button" data-i18n="clear_mirror_history">Clear
      notification</button>
  </div>

  <div class="setup-guide" id="setupGuide">
    <h3 data-i18n="setup_required">Setup Required</h3>
    <p data-i18n="setup_configure_token">Configure your Pushbullet access token to start using the extension.</p>
    <button class="setup-button" id="openOptionsButton" data-i18n="open_settings_button">Open Settings</button>
  </div>

  <div class="send-form">
    <div id="quickShareContainer" class="quick-share-container" style="display: none;">
      <div class="quick-share-content">
        <span class="quick-share-url" id="quickShareUrl"></span>
        <button id="quickShareSend" class="quick-share-button" data-i18n="send">Send</button>
      </div>
    </div>
    <div class="compose">
      <textarea id="bodyInput" rows="1" data-i18n-placeholder="type_or_paste_placeholder" placeholder="Type or paste"></textarea>
      <div class="compose-toolbar">
        <button class="target-control is-default" id="targetControl" type="button" hidden>
          <span class="tc-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M4,6H22V4H4C2.89,4 2,4.89 2,6V17H0V20H14V17H4V6M23,8H17C16.5,8 16,8.5 16,9V19C16,19.5 16.5,20 17,20H23C23.5,20 24,19.5 24,19V9C24,8.5 23.5,8 23,8M22,17H18V10H22V17Z" />
            </svg>
          </span>
          <span class="tc-label" id="targetControlLabel"></span>
          <span class="tc-caret">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z" />
            </svg>
          </span>
          <span class="tc-clear" id="targetControlClear" data-i18n-title="target_clear_tooltip" title="Back to default">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
            </svg>
          </span>
        </button>
        <div class="toolbar-actions">
          <button id="sendFileButton" class="icon-button is-secondary" data-i18n-title="send_file_title"
            title="Send file/image">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
            </svg>
          </button>
          <button id="sendButton" class="icon-button send-button" data-i18n-title="send_message_title"
            title="Send message">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
            </svg>
            <span class="send-label" data-i18n="send">Send</span>
          </button>
        </div>
      </div>
    </div>
    <div class="target-menu" id="targetMenu" hidden></div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>

</html>
